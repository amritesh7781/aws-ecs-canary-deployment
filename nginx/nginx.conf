# Nginx canary load balancer
# Mimics ALB weighted target group behavior locally
#
# Weight breakdown (configurable via docker-compose env):
#   app-v1: weight=8  → ~80% of traffic  (stable)
#   app-v2: weight=2  → ~20% of traffic  (canary)
#
# To change the split, edit the weight values and run:
#   docker compose restart nginx

upstream canary_backend {
    server app-v1-a:3000 weight=4;   # stable replica A — 40%
    server app-v1-b:3000 weight=4;   # stable replica B — 40%
    server app-v2:3000   weight=2;   # canary           — 20%

    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Disable response buffering so the browser sees live data
    proxy_buffering off;

    # Don't let nginx cache upstream responses
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Canary-Proxy "nginx-weighted-upstream" always;

    location / {
        proxy_pass         http://canary_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Forward request to the same upstream server for the full page load
        proxy_set_header   X-Request-ID $request_id;
    }

    location /health {
        proxy_pass         http://canary_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }
}
